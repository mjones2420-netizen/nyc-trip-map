<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NYC Trip — Apr 2026</title>
<style>
  :root {
    --bg: #f4f2ef;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
    --border: #e2ddd8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    z-index: 10;
  }
  .title-row { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .title-row h1 { font-size:18px; font-weight:700; letter-spacing:-0.4px; }
  .title-row span { font-size:11px; color:var(--muted); }

  /* TABS */
  .tabs { display:flex; overflow-x:auto; scrollbar-width:none; gap:0; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex-shrink:0; padding:7px 11px; font-size:11px; font-weight:600;
    color:var(--muted); cursor:pointer; border:none; background:none;
    border-bottom:2.5px solid transparent; transition:color .15s,border-color .15s;
    white-space:nowrap; font-family:inherit; letter-spacing:0.01em;
  }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--text); border-bottom-color:var(--text); }
  .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; position:relative; top:-1px; }

  /* BANNER */
  #info-banner {
    background:#e8f4fd; border-bottom:1px solid #b8d9f0; color:#1a5a8a;
    padding:7px 16px; font-size:11.5px; text-align:center; flex-shrink:0;
    display:block;
  }

  /* MAP WRAPPER */
  #map-wrap {
    flex:1; position:relative; overflow:hidden; min-height:0;
    background:#e8e0d5;
    cursor: grab;
  }
  #map-wrap:active { cursor: grabbing; }

  /* OSM TILE LAYER */
  #tile-layer {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    will-change: transform;
  }

  /* PIN LAYER */
  #pin-layer {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:5;
  }

  .map-pin {
    position:absolute;
    transform:translate(-50%, -100%);
    cursor:pointer;
    pointer-events:all;
    transition: transform 0.1s;
  }
  .map-pin:active { transform:translate(-50%, -100%) scale(1.2); }
  .map-pin svg { display:block; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.25)); }

  /* ZOOM CONTROLS */
  .zoom-btns {
    position:absolute; right:12px; bottom:12px; z-index:20;
    display:flex; flex-direction:column; gap:2px;
  }
  .zoom-btn {
    width:36px; height:36px; background:var(--surface);
    border:1px solid var(--border); border-radius:6px;
    font-size:20px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.12); color:var(--text);
    font-family:inherit; font-weight:300;
  }

  /* TOOLTIP */
  #tooltip {
    position:absolute; z-index:30; background:var(--surface);
    border:1px solid var(--border); border-radius:6px;
    padding:7px 10px; font-size:12.5px; font-weight:500;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    pointer-events:none; display:none; max-width:200px;
    white-space:normal; line-height:1.4;
  }
  #tooltip .tt-sub { font-size:10.5px; color:var(--muted); font-weight:400; margin-top:2px; }
  #tooltip .tt-lock { font-size:10.5px; color:#c0392b; margin-top:2px; }

  /* LEGEND */
  #legend {
    background:var(--surface); border-top:1px solid var(--border);
    padding:10px 16px; max-height:140px; overflow-y:auto; flex-shrink:0;
  }
  .leg-title { font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .leg-grid { display:flex; flex-wrap:wrap; gap:4px 14px; }
  .leg-item { display:flex; align-items:center; gap:5px; font-size:11.5px; line-height:1.4; }
  .leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .leg-lock { font-size:9px; }

  /* Attribution */
  #attrib {
    position:absolute; bottom:4px; left:6px; z-index:20;
    font-size:9px; color:#555; background:rgba(255,255,255,0.75);
    padding:1px 4px; border-radius:3px;
  }
  #attrib a { color:#555; }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1>New York City</h1>
    <span>22 – 29 April 2026 &nbsp;·&nbsp; 8 days</span>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<div id="info-banner">🌐 Open once with internet to cache map tiles &nbsp;·&nbsp; Pins work offline</div>

<div id="map-wrap">
  <div id="tile-layer"></div>
  <div id="pin-layer"></div>
  <div id="tooltip"></div>
  <div id="attrib"><a href="https://www.openstreetmap.org/copyright">© OpenStreetMap</a></div>
  <div class="zoom-btns">
    <button class="zoom-btn" id="zin">+</button>
    <button class="zoom-btn" id="zout">−</button>
  </div>
</div>

<div id="legend">
  <div class="leg-title" id="leg-title">All stops</div>
  <div class="leg-grid"  id="leg-grid"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DAYS = [
  { id:"overview", label:"Overview", color:null, date:"", area:"", stops:[] },
  { id:"d1", label:"Wed 22", color:"#c0392b", date:"Wed 22 Apr", area:"Arrival Day", stops:[
    { name:"Hotel Check-in (Midtown)", lat:40.7549, lng:-73.9840, booked:false },
    { name:"Times Square",             lat:40.7580, lng:-73.9855, booked:false }
  ]},
  { id:"d2", label:"Thu 23", color:"#d35400", date:"Thu 23 Apr", area:"Midtown East / Rockefeller", stops:[
    { name:"Top of the Rock",        lat:40.7593, lng:-73.9789, booked:true  },
    { name:"Fifth Avenue",           lat:40.7580, lng:-73.9756, booked:false },
    { name:"Trump Tower",            lat:40.7626, lng:-73.9737, booked:false },
    { name:"Grand Central Terminal", lat:40.7527, lng:-73.9772, booked:false }
  ]},
  { id:"d3", label:"Fri 24", color:"#27ae60", date:"Fri 24 Apr", area:"Lower Manhattan + Brooklyn", stops:[
    { name:"Statue of Liberty Ferry (Battery Park)", lat:40.7001, lng:-74.0168, booked:true  },
    { name:"9/11 Memorial & Museum",                 lat:40.7115, lng:-74.0134, booked:false },
    { name:"Wall Street",                            lat:40.7074, lng:-74.0113, booked:false },
    { name:"Chinatown",                              lat:40.7158, lng:-73.9970, booked:false },
    { name:"Brooklyn Bridge",                        lat:40.7061, lng:-73.9969, booked:false },
    { name:"DUMBO",                                  lat:40.7033, lng:-73.9890, booked:false }
  ]},
  { id:"d4", label:"Sat 25", color:"#2980b9", date:"Sat 25 Apr", area:"Central Park Area", stops:[
    { name:"Bethesda Terrace", lat:40.7739, lng:-73.9710, booked:false },
    { name:"Bow Bridge",       lat:40.7752, lng:-73.9715, booked:false },
    { name:"The Mall",         lat:40.7714, lng:-73.9726, booked:false },
    { name:"Plaza Hotel",      lat:40.7645, lng:-73.9742, booked:false },
    { name:"Columbus Circle",  lat:40.7681, lng:-73.9819, booked:false }
  ]},
  { id:"d5", label:"Sun 26", color:"#8e44ad", date:"Sun 26 Apr", area:"West Side / Hudson Yards", stops:[
    { name:"Vessel, Hudson Yards",  lat:40.7536, lng:-74.0022, booked:false },
    { name:"The High Line (north)", lat:40.7480, lng:-74.0048, booked:false },
    { name:"Chelsea Market",        lat:40.7424, lng:-74.0058, booked:false },
    { name:"The Edge",              lat:40.7538, lng:-74.0019, booked:true  }
  ]},
  { id:"d6", label:"Mon 27", color:"#16a085", date:"Mon 27 Apr", area:"Classic NYC Midtown", stops:[
    { name:"Empire State Building",     lat:40.7484, lng:-73.9857, booked:false },
    { name:"Rockefeller Center",        lat:40.7587, lng:-73.9787, booked:false },
    { name:"Broadway Theatre District", lat:40.7590, lng:-73.9845, booked:false }
  ]},
  { id:"d7", label:"Tue 28", color:"#e67e22", date:"Tue 28 Apr", area:"Greenwich Village + SoHo", stops:[
    { name:"Washington Square Park",  lat:40.7308, lng:-73.9973, booked:false },
    { name:"Greenwich Village",       lat:40.7335, lng:-74.0027, booked:false },
    { name:"SoHo cast-iron district", lat:40.7230, lng:-74.0020, booked:false },
    { name:"Little Italy / Nolita",   lat:40.7191, lng:-73.9973, booked:false }
  ]},
  { id:"d8", label:"Wed 29", color:"#7f8c8d", date:"Wed 29 Apr", area:"Departure Day", stops:[
    { name:"Fifth Ave — final coffee",  lat:40.7580, lng:-73.9756, booked:false },
    { name:"JFK Airport (VS0128 home)", lat:40.6413, lng:-73.7781, booked:false }
  ]}
];
DAYS[0].stops = DAYS.slice(1).flatMap(d =>
  d.stops.map(s => ({...s, _day:d.label, _color:d.color}))
);

// ─── SLIPPY MAP ENGINE ───────────────────────────────────────────────────────
const TILE_SIZE = 256;
let zoom = 12;
// Map centre in tile coords at current zoom
let cx, cy; // centre tile coords (fractional)

function latLngToTile(lat, lng, z) {
  const n = Math.pow(2, z);
  const x = (lng + 180) / 360 * n;
  const latR = lat * Math.PI / 180;
  const y = (1 - Math.log(Math.tan(latR) + 1/Math.cos(latR)) / Math.PI) / 2 * n;
  return {x, y};
}

// Start centred on Midtown Manhattan
const startTile = latLngToTile(40.730, -73.988, zoom);
cx = startTile.x; cy = startTile.y;

const wrap = document.getElementById("map-wrap");
const tileLayer = document.getElementById("tile-layer");
const pinLayer  = document.getElementById("pin-layer");
const tooltip   = document.getElementById("tooltip");

// Tile cache
const tileCache = {};

function getTileKey(tx, ty, tz) { return `${tz}/${tx}/${ty}`; }

function renderTiles() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const tilesX = Math.ceil(W / TILE_SIZE) + 2;
  const tilesY = Math.ceil(H / TILE_SIZE) + 2;

  // Origin tile (top-left of viewport)
  const originTX = Math.floor(cx - W / (2 * TILE_SIZE));
  const originTY = Math.floor(cy - H / (2 * TILE_SIZE));

  const needed = new Set();

  for (let dy = -1; dy <= tilesY; dy++) {
    for (let dx = -1; dx <= tilesX; dx++) {
      const tx = originTX + dx;
      const ty = originTY + dy;
      const maxT = Math.pow(2, zoom);
      if (ty < 0 || ty >= maxT) continue;
      const wtx = ((tx % maxT) + maxT) % maxT;
      const key = getTileKey(wtx, ty, zoom);
      needed.add(key + "|" + tx + "|" + ty);
    }
  }

  // Remove tiles no longer needed
  Array.from(tileLayer.children).forEach(el => {
    if (!needed.has(el.dataset.needed)) el.remove();
  });

  needed.forEach(nkey => {
    if (tileLayer.querySelector(`[data-needed="${nkey}"]`)) return;
    const [key, txStr, tyStr] = nkey.split("|");
    const tx = parseInt(txStr), ty = parseInt(tyStr);
    const maxT = Math.pow(2, zoom);
    const wtx = ((tx % maxT) + maxT) % maxT;

    const img = document.createElement("img");
    img.dataset.needed = nkey;
    img.style.position = "absolute";
    img.style.width = TILE_SIZE + "px";
    img.style.height = TILE_SIZE + "px";
    img.style.imageRendering = "pixelated";
    img.draggable = false;

    const subdomains = ["a","b","c"];
    const s = subdomains[(wtx + ty) % 3];
    img.src = `https://${s}.tile.openstreetmap.org/${zoom}/${wtx}/${ty}.png`;
    img.onerror = () => { img.style.background = "#ddd"; };

    positionTile(img, tx, ty);
    tileLayer.appendChild(img);
  });

  // Reposition all tiles
  Array.from(tileLayer.children).forEach(el => {
    const nkey = el.dataset.needed;
    if (!nkey) return;
    const parts = nkey.split("|");
    const tx = parseInt(parts[1]), ty = parseInt(parts[2]);
    positionTile(el, tx, ty);
  });

  renderPins();
}

function positionTile(el, tx, ty) {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const left = (tx - cx) * TILE_SIZE + W / 2;
  const top  = (ty - cy) * TILE_SIZE + H / 2;
  el.style.left = left + "px";
  el.style.top  = top  + "px";
}

// ─── PINS ─────────────────────────────────────────────────────────────────────
let currentDayId = "overview";
let activePins = [];

function latLngToScreen(lat, lng) {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const t = latLngToTile(lat, lng, zoom);
  return {
    x: (t.x - cx) * TILE_SIZE + W / 2,
    y: (t.y - cy) * TILE_SIZE + H / 2
  };
}

function makePinSVG(color, booked) {
  const inner = booked
    ? `<text x="11" y="15.5" font-size="10" text-anchor="middle" fill="white" font-family="sans-serif">🔒</text>`
    : `<circle cx="11" cy="11" r="3.8" fill="rgba(255,255,255,0.88)"/>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="30" viewBox="0 0 22 30">
    <path d="M11 0C4.925 0 0 4.925 0 11c0 8 11 19 11 19S22 19 22 11C22 4.925 17.075 0 11 0z"
      fill="${color}" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    ${inner}</svg>`;
}

function renderPins() {
  pinLayer.innerHTML = "";
  activePins = [];

  const day = DAYS.find(d => d.id === currentDayId);
  if (!day) return;

  const stopsToShow = currentDayId === "overview"
    ? DAYS.slice(1).flatMap(d => d.stops.map(s => ({...s, _color:d.color, _day:d.label})))
    : day.stops.map(s => ({...s, _color:day.color}));

  stopsToShow.forEach(stop => {
    const pos = latLngToScreen(stop.lat, stop.lng);
    const pin = document.createElement("div");
    pin.className = "map-pin";
    pin.style.left = pos.x + "px";
    pin.style.top  = pos.y + "px";
    pin.innerHTML = makePinSVG(stop._color || "#888", stop.booked);
    pin.addEventListener("click", e => showTooltip(e, stop, pos));
    pin.addEventListener("touchend", e => { e.preventDefault(); showTooltip(e.touches[0]||e.changedTouches[0], stop, pos); });
    pinLayer.appendChild(pin);
    activePins.push({pin, stop});
  });
}

function showTooltip(e, stop, pos) {
  const sub  = stop._day   ? `<div class="tt-sub">${stop._day}</div>` : "";
  const lock = stop.booked ? `<div class="tt-lock">🔒 Pre-booked</div>` : "";
  tooltip.innerHTML = `<div>${stop.name}</div>${sub}${lock}`;
  tooltip.style.display = "block";

  const W = wrap.clientWidth, H = wrap.clientHeight;
  let tx = pos.x + 14, ty = pos.y - 50;
  if (tx + 210 > W) tx = pos.x - 210;
  if (ty < 0) ty = pos.y + 10;
  tooltip.style.left = tx + "px";
  tooltip.style.top  = ty + "px";

  e && e.stopPropagation && e.stopPropagation();
}

wrap.addEventListener("click", () => { tooltip.style.display = "none"; });

// ─── DRAG TO PAN ─────────────────────────────────────────────────────────────
let drag = null;

wrap.addEventListener("mousedown", e => {
  drag = {startX:e.clientX, startY:e.clientY, cx0:cx, cy0:cy};
  tooltip.style.display = "none";
});
window.addEventListener("mousemove", e => {
  if (!drag) return;
  const dx = (e.clientX - drag.startX) / TILE_SIZE;
  const dy = (e.clientY - drag.startY) / TILE_SIZE;
  cx = drag.cx0 - dx; cy = drag.cy0 - dy;
  renderTiles();
});
window.addEventListener("mouseup", () => { drag = null; });

// Touch pan
let touch = null;
wrap.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    touch = {startX:e.touches[0].clientX, startY:e.touches[0].clientY, cx0:cx, cy0:cy};
    tooltip.style.display = "none";
  }
}, {passive:true});
wrap.addEventListener("touchmove", e => {
  if (!touch || e.touches.length !== 1) return;
  const dx = (e.touches[0].clientX - touch.startX) / TILE_SIZE;
  const dy = (e.touches[0].clientY - touch.startY) / TILE_SIZE;
  cx = touch.cx0 - dx; cy = touch.cy0 - dy;
  renderTiles();
}, {passive:true});
wrap.addEventListener("touchend", () => { touch = null; });

// Pinch zoom
let pinchDist0 = null, pinchZoom0 = null;
wrap.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.sqrt(dx*dx+dy*dy);
    pinchZoom0 = zoom;
  }
}, {passive:true});
wrap.addEventListener("touchmove", e => {
  if (e.touches.length !== 2 || !pinchDist0) return;
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const ratio = dist / pinchDist0;
  const newZoom = Math.round(pinchZoom0 + Math.log2(ratio));
  setZoom(newZoom);
}, {passive:true});
wrap.addEventListener("touchend", () => { pinchDist0 = null; });

// Scroll to zoom
wrap.addEventListener("wheel", e => {
  e.preventDefault();
  setZoom(zoom + (e.deltaY < 0 ? 1 : -1));
}, {passive:false});

// ─── ZOOM ─────────────────────────────────────────────────────────────────────
function setZoom(z) {
  const newZ = Math.max(10, Math.min(18, z));
  if (newZ === zoom) return;
  const scale = Math.pow(2, newZ - zoom);
  cx *= scale; cy *= scale;
  zoom = newZ;
  tileLayer.innerHTML = "";
  renderTiles();
}
document.getElementById("zin").addEventListener("click",  () => setZoom(zoom+1));
document.getElementById("zout").addEventListener("click", () => setZoom(zoom-1));

// ─── TABS ─────────────────────────────────────────────────────────────────────
function fitDay(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day || !day.stops.length) return;
  if (dayId === "overview") {
    const t = latLngToTile(40.730, -73.988, zoom);
    cx = t.x; cy = t.y;
    if (zoom !== 12) setZoom(12);
    return;
  }
  const lats = day.stops.map(s => s.lat);
  const lngs = day.stops.map(s => s.lng);
  const midLat = (Math.min(...lats)+Math.max(...lats))/2;
  const midLng = (Math.min(...lngs)+Math.max(...lngs))/2;
  const t = latLngToTile(midLat, midLng, zoom);
  cx = t.x; cy = t.y;
}

function updateLegend(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  document.getElementById("leg-title").textContent =
    dayId === "overview" ? "All stops" : `${day.date} — ${day.area}`;
  const grid = document.getElementById("leg-grid");
  grid.innerHTML = "";
  const list = dayId === "overview"
    ? DAYS.slice(1).flatMap(d => d.stops.map(s => ({...s,_color:d.color})))
    : day.stops.map(s => ({...s,_color:day.color}));
  list.forEach(s => {
    const el = document.createElement("div");
    el.className = "leg-item";
    el.innerHTML = `<span class="leg-dot" style="background:${s._color}"></span>
      <span>${s.name}${s.booked?" <span class='leg-lock'>🔒</span>":""}</span>`;
    grid.appendChild(el);
  });
}

function switchDay(dayId) {
  currentDayId = dayId;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.id === dayId)
  );
  fitDay(dayId);
  renderTiles();
  updateLegend(dayId);
  tooltip.style.display = "none";
}

// Build tabs
const tabsEl = document.getElementById("tabs");
DAYS.forEach(day => {
  const btn = document.createElement("button");
  btn.className = "tab" + (day.id==="overview"?" active":"");
  btn.dataset.id = day.id;
  btn.innerHTML = day.color
    ? `<span class="dot" style="background:${day.color}"></span>${day.label}`
    : day.label;
  btn.addEventListener("click", () => switchDay(day.id));
  tabsEl.appendChild(btn);
});

// ─── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener("resize", () => { tileLayer.innerHTML=""; renderTiles(); });
switchDay("overview");
</script>
</body>
</html>
